<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro</title>
</head>

<body>

    <main class="area-principal">

        <section class="area-cadastro">
            <section class="area-titulo">
                <h1>Cadastre-se</h1>
            </section>
            <form action="#" method="post" class="form-cadastro">

                <div class="area-nome">
                    <div class="primeiro-nome label-input">
                        <label for="nome">nome</label>
                        <input type="text" id="nome" placeholder="Digite seu nome" required>
                    </div>
                    <div class="ultimo-nome label-input">
                        <label for="sobrenome">sobrenome</label>
                        <input type="text" id="sobrenome" placeholder="Digite seu sobrenome" >
                    </div>
                </div>

                <div class="area-acesso">
                    <div class="email label-input">
                        <label for="email">email</label>
                        <input type="email" id="email" placeholder="Digite seu email" required>
                    </div>
                    <div class="senha label-input">
                        <label for="senha">senha</label>
                        <input type="password" id="senha" placeholder="●●●●●●●●" required>
                    </div>
                </div>

                <div class="area-telefone">
                    <div class="ddd label-input">
                        <label for="ddd">ddd</label>
                        <input type="number" max="99" id="ddd" placeholder="ddd" required>
                    </div>
                    <div class="telefone label-input">
                        <label for="telefone">telefone</label>
                        <input type="text" id="telefone" placeholder="Digite seu telefone" required>
                    </div>
                </div>

                <div class="area-dados">
                    <div class="data-nascimento label-input">
                        <label for="data-nascimento">data de nascimento</label>
                        <input type="date" id="data-nascimento" required>
                    </div>
                    <div class="genero label-input ">
                        <label for="genero">gênero</label>
                        <select id="genero" required>
                            <option value="">Selecione seu gênero</option>
                            <option value="masculino">Masculino</option>
                            <option value="feminino">Feminino</option>
                            <option value="outro">Outro</option>
                            <option value="prefiro">Prefiro não declarar</option>
                        </select>
                    </div>
                </div>

                <div class="area-button">
                    <button type="submit" id="btn-cadastrar"> cadastrar </button>
                    <a class="link-conta" href="login.html">Já possui uma conta? Acesse agora !</a>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
