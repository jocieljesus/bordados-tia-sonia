<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Tia Sônia</title>
    <link rel="stylesheet" href="cadastro.css" />
  </head>
  <body class="area-login">
    <main class="area-principal-login">
      <section class="area-cadastro">
        <section class="area-titulo">
          <h1>Login</h1>
        </section>
        <form action="#" method="post" class="form-cadastro">
          <div class="area-acesso">
            <div class="email label-input">
              <label for="email">email</label>
              <input
                type="email"
                id="email"
                placeholder="Digite seu email"
                required
              />
            </div>
            <div class="senha label-input">
              <label for="senha">senha</label>
              <input
                type="password"
                id="senha"
                placeholder="●●●●●●●●"
                required
              />
            </div>
          </div>
          <div class="area-button">
            <button type="submit" id="btn-login"><a href="index.html" >Login</a></button>
            <a class="link-conta" href="cadastro.html"> Não tem cadastro? Criar conta</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
